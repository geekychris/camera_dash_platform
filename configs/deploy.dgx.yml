# NVIDIA DGX Spark profile (full-fat GPU)
profile:
  name: dgx
  default_device: cuda
  default_detector_model: yolov8x.pt
  target_fps: 30
  max_inflight_frames: 4

storage:
  dsn: sqlite+aiosqlite:///./data/camera_dash.db
  clips_dir: ./data/clips

streaming:
  mediamtx_host: 127.0.0.1
  mediamtx_rtsp_port: 8554
  mediamtx_webrtc_port: 8889
  mediamtx_api_port: 9997

server:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - http://localhost:5173
